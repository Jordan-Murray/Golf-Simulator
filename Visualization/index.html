<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Golf 3D - Shot Visualizer</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="loading">Loading visualization data...</div>
    <canvas id="canvas"></canvas>

    <div id="top-bar">
        <span id="course-name">-</span>
        <span id="round-info">-</span>
        <label id="spread-toggle">
            <input id="spread-mode" type="checkbox" />
            <span>Spread Mode</span>
        </label>
        <select id="spread-club">
            <option value="all">All Clubs</option>
            <option value="tee">Tee Shots</option>
            <option value="13">Putter</option>
        </select>
        <select id="spread-range">
            <option value="all">All Rounds</option>
            <option value="50">Last 50</option>
            <option value="20" selected>Last 20</option>
            <option value="10">Last 10</option>
        </select>
        <label id="heatmap-toggle">
            <input id="spread-heatmap" type="checkbox" checked />
            <span>Heatmap</span>
        </label>
        <button id="btn-best-hole" title="Replay best score on this hole">Replay Best Hole</button>
        <button id="btn-worst-hole" title="Replay worst score on this hole">Replay Worst Hole</button>
        <select id="sim-holes" title="Simulation holes">
            <option value="9" selected>Sim 9</option>
            <option value="18">Sim 18</option>
        </select>
        <input id="sim-rounds" type="number" min="1" max="100" value="10" />
        <button id="btn-sim-api" title="Run simulation API">Run Sim API</button>
        <select id="round-select"></select>
    </div>

    <div id="hole-panel">
        <div id="hole-title">Hole 1</div>
        <div id="hole-par">Par 4</div>
        <div id="hole-score">-</div>
    </div>

    <div id="hole-analytics">
        <div id="hole-analytics-title">Hole Analytics</div>
        <pre id="hole-analytics-body">Spread mode off</pre>
    </div>

    <div id="shot-panel">
        <div id="shot-num">On the tee</div>
        <div id="shot-club">-</div>
        <div id="shot-dist">-</div>
    </div>

    <div id="geometry-debug">
        <div id="geometry-debug-title">Geometry Debug</div>
        <pre id="geometry-debug-body">Waiting for hole...</pre>
    </div>
    <div id="sim-api-panel">
        <div id="sim-api-title">Simulation API</div>
        <pre id="sim-api-body">Not run yet.</pre>
    </div>

    <div id="controls">
        <button class="ctrl-btn" id="btn-prev-hole" title="Previous Hole"><<</button>
        <button class="ctrl-btn" id="btn-prev-shot" title="Previous Shot"><</button>
        <div class="ctrl-divider"></div>
        <button class="ctrl-btn play" id="btn-play" title="Play / Pause">Play</button>
        <div class="ctrl-divider"></div>
        <button class="ctrl-btn" id="btn-next-shot" title="Next Shot">></button>
        <button class="ctrl-btn" id="btn-next-hole" title="Next Hole">>></button>
    </div>

    <div id="timeline-panel">
        <input id="shot-timeline" type="range" min="0" max="1" step="0.01" value="0" />
        <div id="timeline-label">Tee</div>
        <label id="cinematic-wrap">
            <input id="cinematic-mode" type="checkbox" checked />
            <span>Cinematic Mode</span>
        </label>
    </div>

    <div id="scorecard-bar">
        <div id="scorecard"></div>
    </div>

    <div id="kb-hint">Left/Right shots | Up/Down holes | Space play | G debug | B best | W worst</div>

    <script type="module" src="js/main.js?v=20260309o"></script>
</body>
</html>
